name: Build & Push Fish-Audio Pod Image

# Auto-builds and pushes the OnShot fish-audio pod docker image to GHCR.
# Image bundles MusicGen Medium (BGM) + AudioGen Medium (SFX) on torch 2.8 /
# CUDA 12.8.1 — the working stack from deploy_fish.sh.

on:
  push:
    branches: [main]
    paths:
      - 'fish-audio/**'
      - '.github/workflows/build-fish-audio.yml'
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override the version tag (default: read from fish-audio/VERSION)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: agrim-intelligence/fish-audio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        # NOTE: tag_override is sourced from inputs via env (never inlined into run:)
        # to satisfy the standard GitHub Actions injection-safety guidance.
        env:
          TAG_OVERRIDE: ${{ inputs.tag_override }}
        run: |
          if [ -n "$TAG_OVERRIDE" ]; then
            VER="$TAG_OVERRIDE"
          else
            VER="$(tr -d '[:space:]' < fish-audio/VERSION)"
          fi
          if [ -z "$VER" ]; then
            echo "::error::Could not resolve version tag"
            exit 1
          fi
          # Defensive: only allow a conservative tag charset (semver-ish).
          if ! printf '%s' "$VER" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "::error::Refusing tag with unsafe characters: $VER"
            exit 1
          fi
          echo "tag=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $VER"

      - name: Free disk space (image is ~12 GB with baked HF weights)
        run: |
          # Drop bundled Android/dotnet/Haskell trees we don't need so the
          # build doesn't OOM-fail on disk pressure mid-checkpoint-download.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: fish-audio
          file: fish-audio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Layer cache between runs — the ~6 GB MusicGen + AudioGen download
          # is the most expensive layer; cache it aggressively.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
          REGISTRY_URL: ${{ env.REGISTRY }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}
        run: |
          {
            echo "## Fish-Audio image published"
            echo ""
            echo "- Tag: \`${REGISTRY_URL}/${IMAGE_REF}:${IMAGE_TAG}\`"
            echo "- Also tagged \`:latest\`"
            echo "- Pull with: \`docker pull ${REGISTRY_URL}/${IMAGE_REF}:${IMAGE_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"
